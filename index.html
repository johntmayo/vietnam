<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Vietnam Trip Field Journal — March 2026">
  <title>Vietnam · Field Journal</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#DEC9A8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="VN Journal">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Special+Elite&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="screens">
      <div id="screen-today"   class="screen active"></div>
      <div id="screen-journey" class="screen"></div>
      <div id="screen-places"  class="screen"></div>
      <div id="screen-refs"    class="screen"></div>
    </div>

    <nav class="tab-nav" role="navigation" aria-label="Main navigation">
      <button class="tab-btn active" data-screen="today" aria-label="Today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <span>Today</span>
      </button>
      <button class="tab-btn" data-screen="journey" aria-label="Journey">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l4-9 4 5 3-4 4 8"/>
        </svg>
        <span>Journey</span>
      </button>
      <button class="tab-btn" data-screen="places" aria-label="Places">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s-8-6.5-8-12a8 8 0 0 1 16 0c0 5.5-8 12-8 12z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        <span>Places</span>
      </button>
      <button class="tab-btn" data-screen="refs" aria-label="References">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="16" height="18" rx="1.5"/>
          <path d="M8 8h8M8 12h8M8 16h5"/>
        </svg>
        <span>Refs</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
